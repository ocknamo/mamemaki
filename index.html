<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Split LN Sender</title>
    <style>
      :root {
        --bg: #f4f5f7;
        --card: #ffffff;
        --text: #1c1e21;
        --muted: #6b7280;
        --border: #d7dae0;
        --accent: #f7931a;
        --accent-dark: #d97b06;
        --danger: #dc2626;
        --success: #16a34a;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font: 16px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      .app {
        max-width: 30rem;
        margin: 0 auto;
        padding: 1rem 0.9rem 0;
        display: flex;
        flex-direction: column;
        min-height: 100dvh;
      }
      .app-header {
        padding: 0.25rem 0.2rem 0.75rem;
      }
      .app-header h1 {
        margin: 0;
        font-size: 1.45rem;
        letter-spacing: -0.01em;
      }
      .tagline {
        margin: 0.15rem 0 0;
        color: var(--muted);
        font-size: 0.85rem;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 0.9rem;
        margin-bottom: 0.75rem;
        box-shadow: 0 1px 3px rgb(0 0 0 / 0.05);
      }
      .card h2 {
        margin: 0 0 0.6rem;
        font-size: 1rem;
        letter-spacing: 0.01em;
      }
      input,
      textarea {
        width: 100%;
        font: inherit;
        font-size: 16px; /* prevent iOS zoom-on-focus */
        color: inherit;
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 9px;
        padding: 0.55rem 0.6rem;
      }
      input:focus,
      textarea:focus {
        outline: 2px solid var(--accent);
        outline-offset: -1px;
        border-color: var(--accent);
      }
      input[aria-invalid] {
        border-color: var(--danger);
      }
      input:disabled {
        background: var(--bg);
        color: var(--muted);
      }
      .row-head {
        display: grid;
        grid-template-columns: 1fr 6.2rem 2rem;
        gap: 0.4rem;
        font-size: 0.72rem;
        color: var(--muted);
        margin-bottom: 0.3rem;
        padding: 0 0.1rem;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 6.2rem 2rem;
        gap: 0.4rem;
        align-items: center;
        margin-bottom: 0.45rem;
      }
      .amt {
        text-align: right;
      }
      .icon-btn {
        border: none;
        background: none;
        color: var(--muted);
        font-size: 1rem;
        padding: 0.4rem 0.2rem;
        cursor: pointer;
        border-radius: 8px;
      }
      .icon-btn:active {
        background: var(--bg);
      }
      .ghost-btn {
        display: inline-block;
        border: 1px solid var(--border);
        background: #fff;
        color: var(--text);
        font: inherit;
        font-size: 0.9rem;
        border-radius: 9px;
        padding: 0.45rem 0.8rem;
        cursor: pointer;
      }
      .ghost-btn:active {
        background: var(--bg);
      }
      .ghost-btn:disabled {
        color: var(--muted);
        cursor: default;
        opacity: 0.6;
      }
      .add-row {
        width: 100%;
        margin-top: 0.15rem;
        border-style: dashed;
        color: var(--muted);
      }
      .empty {
        color: var(--muted);
        font-size: 0.9rem;
        text-align: center;
        margin: 0.5rem 0;
      }
      .csv {
        margin-top: 0.75rem;
        border-top: 1px solid var(--border);
        padding-top: 0.6rem;
      }
      .csv summary {
        cursor: pointer;
        font-size: 0.9rem;
        color: var(--muted);
      }
      .csv textarea {
        margin-top: 0.5rem;
        resize: vertical;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 0.85rem;
      }
      .csv-add {
        margin-top: 0.45rem;
      }
      .error-list {
        margin: 0.5rem 0 0;
        padding-left: 1.1rem;
        color: var(--danger);
        font-size: 0.82rem;
      }
      .error-text {
        margin: 0.5rem 0 0;
        color: var(--danger);
        font-size: 0.85rem;
        overflow-wrap: anywhere;
      }
      .nwc-actions {
        display: flex;
        align-items: center;
        gap: 0.6rem;
        margin-top: 0.55rem;
      }
      .nwc-status {
        font-size: 0.85rem;
        color: var(--muted);
      }
      .nwc-status.connected {
        color: var(--success);
        font-weight: 600;
      }
      .progress-count {
        margin: 0 0 0.5rem;
        font-size: 1.2rem;
        font-weight: 700;
        font-variant-numeric: tabular-nums;
      }
      .progress-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .progress-list li {
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
        padding: 0.4rem 0.1rem;
        border-bottom: 1px solid var(--border);
        font-size: 0.9rem;
      }
      .progress-list li:last-child {
        border-bottom: none;
      }
      .st-icon {
        width: 1.1rem;
        text-align: center;
        flex: none;
      }
      .st-who {
        flex: 1;
        overflow-wrap: anywhere;
      }
      .st-res {
        color: var(--muted);
        font-size: 0.82rem;
        text-align: right;
        max-width: 45%;
        overflow-wrap: anywhere;
      }
      .st-success .st-icon,
      .st-success .st-res {
        color: var(--success);
      }
      .st-failed .st-icon,
      .st-failed .st-res {
        color: var(--danger);
      }
      .result-summary {
        margin: 0.6rem 0 0;
        font-size: 0.9rem;
        font-weight: 600;
      }
      .send-bar {
        position: sticky;
        bottom: 0;
        margin-top: auto;
        background: linear-gradient(to top, var(--bg) 75%, transparent);
        padding: 0.75rem 0 calc(0.75rem + env(safe-area-inset-bottom));
      }
      .totals {
        display: flex;
        justify-content: space-between;
        font-size: 0.9rem;
        color: var(--muted);
        padding: 0 0.2rem 0.5rem;
      }
      .totals strong {
        color: var(--text);
        font-variant-numeric: tabular-nums;
      }
      .send-btn {
        width: 100%;
        border: none;
        border-radius: 12px;
        background: var(--accent);
        color: #fff;
        font: inherit;
        font-size: 1.05rem;
        font-weight: 700;
        padding: 0.8rem;
        cursor: pointer;
        box-shadow: 0 2px 8px rgb(247 147 26 / 0.35);
      }
      .send-btn:active {
        background: var(--accent-dark);
      }
      .send-btn:disabled {
        background: #c7cbd1;
        box-shadow: none;
        cursor: default;
      }
      .send-hint {
        margin: 0.4rem 0 0;
        text-align: center;
        font-size: 0.8rem;
        color: var(--muted);
      }
      @media (min-width: 40rem) {
        .app {
          padding-top: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
